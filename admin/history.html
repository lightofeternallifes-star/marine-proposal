<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Estimate History | MarineQuote AI</title>
  <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="sidebar-brand" href="./dashboard.html">
        <span class="brand-mark small">MCE</span>
        <span><strong>MarineQuote</strong><small>Estimate Management</small></span>
      </a>
      <nav aria-label="Primary navigation">
        <a class="nav-item" href="./dashboard.html">Dashboard</a>
        <a class="nav-item" href="./pipeline.html">Pipeline</a>
        <a class="nav-item" href="./natalie.html">Natalie</a>
        <a class="nav-item" href="./customers.html">Customers</a>
        <a class="nav-item" href="./vessels.html">Vessels</a>
        <a class="nav-item" href="./estimates.html">Estimates</a>
        <a class="nav-item active" href="./history.html">History</a>
      </nav>
      <div class="sidebar-footer">
        <span id="user-name">Loading...</span>
        <button id="sign-out" class="button secondary full" type="button">Sign out</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="eyebrow">Saved record</p>
          <h1>Estimate history</h1>
          <p>Review every estimate and its saved versions.</p>
        </div>
      </header>
      <section class="panel">
        <div class="toolbar">
          <label class="search-field" for="history-search">
            <span>Search history</span>
            <input id="history-search" type="search" placeholder="Estimate, customer or vessel">
          </label>
        </div>
        <div id="history-list" class="table-wrap" aria-live="polite"></div>
      </section>
    </main>
  </div>
  <script type="module" src="./js/history.js"></script>
</body>
</html>
