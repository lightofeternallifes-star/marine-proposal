<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Sign In | MarineQuote AI</title>
  <link rel="stylesheet" href="./css/admin.css">
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-brand">
      <div class="brand-mark">MCE</div>
      <p class="eyebrow">Marine Consolidated Electronics</p>
      <h1>MarineQuote AI</h1>
      <p>Secure estimate management for marine electrical services.</p>
    </section>

    <section class="auth-card" aria-labelledby="login-title">
      <p class="eyebrow">Authorized personnel only</p>
      <h2 id="login-title">Sign in</h2>
      <form id="login-form" novalidate>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" minlength="12" required>

        <p id="login-error" class="form-message error" role="alert" hidden></p>
        <button id="login-submit" class="button primary full" type="submit">Sign in</button>
      </form>

      <button id="reset-password" class="button link" type="button">Reset password</button>
      <p id="reset-message" class="form-message" role="status" hidden></p>
    </section>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
