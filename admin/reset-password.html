<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Reset Password | MarineQuote AI</title>
  <link rel="stylesheet" href="./css/admin.css">
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-brand">
      <div class="brand-mark">MCE</div>
      <p class="eyebrow">Marine Consolidated Electronics</p>
      <h1>MarineQuote AI</h1>
    </section>

    <section class="auth-card" aria-labelledby="reset-title">
      <p class="eyebrow">Account security</p>
      <h2 id="reset-title">Choose a new password</h2>
      <form id="password-form" novalidate>
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="12" required>

        <label for="password-confirmation">Confirm password</label>
        <input id="password-confirmation" name="passwordConfirmation" type="password" autocomplete="new-password" minlength="12" required>

        <p id="password-error" class="form-message error" role="alert" hidden></p>
        <p id="password-success" class="form-message" role="status" hidden></p>
        <button id="password-submit" class="button primary full" type="submit">Update password</button>
      </form>
    </section>
  </main>

  <script type="module" src="./js/reset-password.js"></script>
</body>
</html>
